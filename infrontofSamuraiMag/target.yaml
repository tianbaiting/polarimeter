schema_version: 1
module: infrontofSamuraiMag
intent:
  description: "Strict side-exit chamber redesign: keep the active target center at (0,0,0), hold the chamber core at 185 x 185 x 1200 mm with center_z=400 mm so the left/upstream chamber face stays at z=-200 mm while the right/downstream face extends to z=+1000 mm, switch the upstream interface to VF100 and the +z downstream interface to VG80, insert welded round pipe stubs between the chamber and the JIS flanges with a longer front stub (100 mm) and unchanged rear stub (20 mm), keep VG grooves only on the outward equipment-side sealing face while VF stays flat, keep the fixed side-wall ports inside the chamber shell span, cut the chamber and rear end module with cones from the active target center to each detector front-face circle instead of fixed-diameter LOS cylinders, replace the linear three-position target ladder with a single eccentric rotary target that parks clear of the z-axis beam, remove the monolithic stand base plate so only independent support feet plus leveling hardware remain, let the target chamber carry itself on four longer posts at x=±60 mm and only 50 mm inboard from its front/rear ends so the support feet reach the floor before either vertical plate does, let the H plate use a separate four-post support grid at x=-24±200 mm and z=400/840 mm, pull the three HVV plates tight against the target chamber in a photo-like layout, make the H-plate rectangular relief holes follow the actual target-to-detector cone footprint through the plate thickness band so no residual plate material blocks the cone, change the detector clamp screws to side-mounted tightening lines that stay outside the detector envelope, keep the detector + clamp + adapter + bridge + base in one local rigid coordinate system that is rotated as a whole onto the assigned plate, let only the support-side clamp half carry a flat lower saddle that directly contacts the adapter block while the detachable half stays clear and geometry.detector.adapter_block.radial_standoff_mm remains frozen at 0.0, and fuse the support-side clamp half + transition block + uprights + top bridge into one monolithic support carrier while keeping the 4-hole mount base as a separate bolted plate."
build:
  config: config/profiles/side_exit_single_rotary_strict.yaml
  overrides: []
  doc_name: infrontofSamuraiMag
  mode: build
validation:
  strict: true
  angle_tolerance_deg: 0.05
  radius_tolerance_mm: 0.2
output:
  output_dir: .
  basename: infrontofSamuraiMag
  formats: [fcstd, step]
artifacts:
  report_json: infrontofSamuraiMag.validation_report.json
